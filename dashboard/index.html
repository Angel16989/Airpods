<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apple Icon Automation</title>
<style>
  :root {
    --page: #f7f7f4;
    --surface: #ffffff;
    --surface-2: #f0f4f8;
    --ink: #111318;
    --muted: #667085;
    --border: #d7dde5;
    --blue: #2563eb;
    --green: #108a42;
    --amber: #b76b00;
    --red: #c2413b;
    --violet: #6d4aff;
    --code: #101828;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0c0f14;
      --surface: #151922;
      --surface-2: #1d2430;
      --ink: #f2f4f7;
      --muted: #98a2b3;
      --border: #303846;
      --blue: #67a2ff;
      --green: #58d68d;
      --amber: #f2b84b;
      --red: #ff8077;
      --violet: #a99bff;
      --code: #e6edf6;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    color: var(--ink);
    background: var(--page);
    font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 22px 16px 56px; }
  header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
  .sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 8px;
    padding: 7px 12px;
    font: inherit;
    cursor: pointer;
  }
  button:hover { border-color: var(--blue); }
  .live { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .grid { display: grid; gap: 14px; }
  .tiles { grid-template-columns: repeat(5, minmax(0, 1fr)); margin-bottom: 14px; }
  .two { grid-template-columns: minmax(0, 1.15fr) minmax(0, .85fr); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    min-width: 0;
  }
  .card h2 { margin: 0 0 10px; font-size: 15px; }
  .tile .label { color: var(--muted); font-size: 12px; }
  .tile .value { font-size: 24px; font-weight: 700; margin-top: 4px; overflow-wrap: anywhere; }
  .tile .hint { color: var(--muted); font-size: 12px; margin-top: 2px; overflow-wrap: anywhere; }
  .good { color: var(--green); }
  .warn { color: var(--amber); }
  .bad { color: var(--red); }
  .blue { color: var(--blue); }
  .violet { color: var(--violet); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--muted); font-size: 12px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); padding: 6px 8px 6px 0; white-space: nowrap; }
  td { border-bottom: 1px solid var(--border); padding: 8px 8px 8px 0; vertical-align: top; }
  tr:last-child td { border-bottom: 0; }
  .scroll { overflow-x: auto; }
  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    white-space: nowrap;
  }
  .badge.complete { color: var(--green); }
  .badge.backlog, .badge.ready { color: var(--muted); }
  .badge.blocked { color: var(--red); }
  .badge.active { color: var(--blue); border-color: var(--blue); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
  .path, .cmd { overflow-wrap: anywhere; }
  pre {
    margin: 8px 0 0;
    padding: 10px;
    overflow: auto;
    max-height: 360px;
    color: var(--code);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    white-space: pre-wrap;
  }
  .log-card { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .log-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; flex-wrap: wrap; }
  .summary { color: var(--muted); margin-top: 5px; overflow-wrap: anywhere; }
  .list { margin: 0; padding-left: 18px; }
  .list li { margin: 4px 0; overflow-wrap: anywhere; }
  .empty { color: var(--muted); font-style: italic; }
  .err { border-color: var(--red); color: var(--red); display: none; margin-bottom: 14px; }
  .err.show { display: block; }
  @media (max-width: 900px) {
    header { align-items: flex-start; flex-direction: column; }
    .tiles, .two { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Apple Icon Automation</h1>
      <p class="sub">Live local view of workers, branches, dirty files, dispatch logs, and the task board.</p>
    </div>
    <div class="toolbar">
      <span class="live"><span class="dot"></span><span id="liveText">Connecting</span></span>
      <button id="refreshBtn" type="button">Refresh</button>
    </div>
  </header>

  <div class="card err" id="errorBox"></div>

  <section class="grid tiles" id="tiles"></section>

  <section class="grid two">
    <div class="card">
      <h2>Running Processes</h2>
      <div class="scroll">
        <table>
          <thead><tr><th>Role</th><th>PID</th><th>Task</th><th>Status</th><th>Command</th></tr></thead>
          <tbody id="processRows"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h2>Git State</h2>
      <div id="gitState"></div>
    </div>
  </section>

  <section class="card" style="margin-top:14px">
    <h2>Task Queue</h2>
    <div class="scroll">
      <table>
        <thead><tr><th>Task</th><th>Feature</th><th>Owner</th><th>Priority</th><th>Status</th><th>Depends on</th></tr></thead>
        <tbody id="taskRows"></tbody>
      </table>
    </div>
  </section>

  <section class="grid two" style="margin-top:14px">
    <div class="card">
      <h2>Latest Dispatch Logs</h2>
      <div id="logs"></div>
    </div>
    <div class="card">
      <h2>Recent Commits</h2>
      <ul class="list mono" id="commits"></ul>
      <h2 style="margin-top:16px">Next Eligible</h2>
      <ul class="list" id="nextTasks"></ul>
    </div>
  </section>
</div>

<script>
"use strict";

const POLL_MS = 5000;
const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
  "&": "&amp;",
  "<": "&lt;",
  ">": "&gt;",
  '"': "&quot;",
  "'": "&#39;",
}[ch]));

function relTime(iso) {
  const ms = Date.now() - Date.parse(iso);
  if (!Number.isFinite(ms)) return "";
  const sec = Math.max(0, Math.round(ms / 1000));
  if (sec < 60) return `${sec}s ago`;
  const min = Math.round(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.round(min / 60);
  if (hr < 24) return `${hr}h ago`;
  return `${Math.round(hr / 24)}d ago`;
}

function badge(status, active = false) {
  const key = String(status || "").toLowerCase();
  const cls = active ? "active" : key.includes("complete") ? "complete" :
    key.includes("blocked") ? "blocked" :
    key.includes("progress") ? "active" : "backlog";
  return `<span class="badge ${cls}">${esc(status || "Unknown")}</span>`;
}

function renderTiles(data) {
  const workers = data.processes.filter((p) => p.role.includes("worker")).length;
  const gradle = data.processes.filter((p) => p.role === "gradle").length;
  const autoPush = data.processes.some((p) => p.role === "auto push watcher");
  const next = data.board.next[0];
  $("tiles").innerHTML = [
    tile("Branch", data.branch, data.head, "blue"),
    tile("Dirty files", data.dirtyCount, data.dirtyCount ? "work in progress" : "clean", data.dirtyCount ? "warn" : "good"),
    tile("Auto push", autoPush ? "On" : "Off", autoPush ? "watching local repo" : "watcher not running", autoPush ? "good" : "warn"),
    tile("Workers", workers, gradle ? `${gradle} Gradle job(s)` : "no Gradle job", workers ? "blue" : "warn"),
    tile("Active task", data.workerTasks.join(", ") || "None", "detected from processes", data.workerTasks.length ? "violet" : "warn"),
    tile("Next up", next ? next["Task ID"] : "None", next ? next.Feature : "no eligible task", "blue"),
  ].join("");
}

function tile(label, value, hint, cls) {
  return `<div class="card tile"><div class="label">${esc(label)}</div><div class="value ${cls || ""}">${esc(value)}</div><div class="hint">${esc(hint || "")}</div></div>`;
}

function renderProcesses(data) {
  const rows = data.processes;
  $("processRows").innerHTML = rows.length ? rows.map((p) => `
    <tr>
      <td>${esc(p.role)}</td>
      <td class="mono">${esc(p.pid)}</td>
      <td>${p.task ? badge(p.task, true) : "<span class='empty'>none</span>"}</td>
      <td class="mono">${esc(p.stat)}</td>
      <td class="mono cmd">${esc(p.command)}</td>
    </tr>
  `).join("") : `<tr><td colspan="5" class="empty">No automation processes found.</td></tr>`;
}

function renderGit(data) {
  const dirty = data.dirty.length ? `<ul class="list mono">${data.dirty.map((line) => `<li>${esc(line)}</li>`).join("")}</ul>` : "<p class='empty'>Worktree clean.</p>";
  $("gitState").innerHTML = `
    <p><strong>Repo:</strong> <span class="mono path">${esc(data.repo)}</span></p>
    <p><strong>Status:</strong></p>
    <pre>${esc(data.status.join("\n") || "No git status output.")}</pre>
    <p><strong>Changed files:</strong></p>
    ${dirty}
  `;
}

function renderTasks(data) {
  const active = new Set(data.workerTasks);
  $("taskRows").innerHTML = data.board.tasks.map((task) => {
    const id = task["Task ID"];
    return `
      <tr>
        <td class="mono">${active.has(id) ? badge(id, true) : esc(id)}</td>
        <td>${esc(task.Feature)}</td>
        <td>${esc(task.Owner)}</td>
        <td>${esc(task.Priority)}</td>
        <td>${badge(task.Status, active.has(id))}</td>
        <td>${esc(task["Depends On"])}</td>
      </tr>
    `;
  }).join("");
}

function renderLogs(data) {
  $("logs").innerHTML = data.logs.length ? data.logs.slice(0, 5).map((log) => `
    <div class="log-card">
      <div class="log-head">
        <strong>${esc(log.name)}</strong>
        <span class="mono">${esc(relTime(log.modifiedAt))}</span>
      </div>
      <div class="summary">${esc(log.summary || "No summary line yet.")}</div>
      <pre>${esc(log.tail.join("\n"))}</pre>
    </div>
  `).join("") : "<p class='empty'>No dispatch logs yet.</p>";
}

function renderSidebar(data) {
  $("commits").innerHTML = data.recentCommits.length ? data.recentCommits.map((line) => `<li>${esc(line)}</li>`).join("") : "<li class='empty'>No commits found.</li>";
  $("nextTasks").innerHTML = data.board.next.length ? data.board.next.map((task) => `<li><span class="mono">${esc(task["Task ID"])}</span> ${esc(task.Feature)} <span class="empty">(${esc(task.Owner)})</span></li>`).join("") : "<li class='empty'>No eligible task.</li>";
}

function render(data) {
  $("errorBox").classList.remove("show");
  $("liveText").textContent = `Updated ${relTime(data.generatedAt)}`;
  renderTiles(data);
  renderProcesses(data);
  renderGit(data);
  renderTasks(data);
  renderLogs(data);
  renderSidebar(data);
}

async function refresh() {
  try {
    const res = await fetch(`/api/status?t=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    render(await res.json());
  } catch (err) {
    $("liveText").textContent = "Disconnected";
    $("errorBox").textContent = `Dashboard API error: ${err.message}`;
    $("errorBox").classList.add("show");
  }
}

$("refreshBtn").addEventListener("click", refresh);
refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
